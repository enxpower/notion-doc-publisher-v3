name: Incremental Content Publish

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        required: true
        default: dry-run
        options:
          - dry-run
          - apply
      confirm_production:
        description: "Type PHASE2-INCREMENTAL-PUBLISH to permit apply mode"
        required: false
        default: ""
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

concurrency:
  group: incremental-content-publish
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.number == 44 &&
       github.actor == 'enxpower' &&
       startsWith(github.event.comment.body, '/phase2-publish PHASE2-INCREMENTAL-PUBLISH '))
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://docs.arcbos.com
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || 'Public' }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || 'Final' }}
      BRAND_TOKENS_JSON: '{"ARCBOS":"ARCBOS","ENERGIZE":"ENERGIZE","AGIM":"AGIM","GONG":"GONG"}'
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}
      PHASE2_PREVIOUS_STATE_PATH: dist/phase2-run/previous-state.json
      PHASE2_STATE_PATH: state/incremental-state.json
      INCREMENTAL_PLAN_PATH: dist/incremental-plan/plan.json
      INCREMENTAL_APPLY_RESULT_PATH: dist/incremental-apply/result.json
      INCREMENTAL_VERIFICATION_RESULT_PATH: dist/incremental-apply/verification.json
      INCREMENTAL_WRITEBACK_RESULT_PATH: dist/incremental-apply/writeback.json
      PHASE2_DEPLOYED_REPO_ROOTS_JSON: '{"ARCBOS":"targets/arcbos-pages","ENERGIZE":"targets/docs-energize-v2","AGIM":"targets/agim-docs","GONG":"targets/pub"}'

    steps:
      - name: Checkout publisher
        uses: actions/checkout@v4

      - name: Resolve execution mode
        id: execution
        shell: bash
        env:
          DISPATCH_MODE: ${{ inputs.mode }}
          DISPATCH_CONFIRMATION: ${{ inputs.confirm_production }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
            if ! printf '%s' "$COMMENT_BODY" | grep -Eq '^/phase2-publish PHASE2-INCREMENTAL-PUBLISH [A-Za-z0-9._-]+ [A-Za-z0-9._-]+$'; then
              echo "Issue command format is invalid."
              exit 1
            fi
            mode="apply"
          else
            mode="${DISPATCH_MODE:-dry-run}"
            if [ "$mode" = "apply" ] && [ "$DISPATCH_CONFIRMATION" != "PHASE2-INCREMENTAL-PUBLISH" ]; then
              echo "Apply mode requires exact confirmation."
              exit 1
            fi
          fi
          if [ "$mode" != "dry-run" ] && [ "$mode" != "apply" ]; then
            echo "Unsupported mode: $mode"
            exit 1
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Load verified GitHub SSH host keys
        id: github-host-keys
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "known_hosts<<EOF"
            gh api meta --jq '.ssh_keys[]' | sed 's/^/github.com /'
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout private state
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PHASE2_STATE_REPOSITORY }}
          path: state
          ssh-key: ${{ secrets.DEPLOY_KEY_STATE }}
          ssh-known-hosts: ${{ steps.github-host-keys.outputs.known_hosts }}
          persist-credentials: true

      - name: Checkout ENERGIZE target
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        uses: actions/checkout@v4
        with:
          repository: enxpower/docs-energize-v2
          path: targets/docs-energize-v2
          ssh-key: ${{ secrets.DEPLOY_KEY_ENERGIZE }}
          ssh-known-hosts: ${{ steps.github-host-keys.outputs.known_hosts }}
          persist-credentials: true

      - name: Checkout AGIM target
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        uses: actions/checkout@v4
        with:
          repository: enxpower/agim-docs
          path: targets/agim-docs
          ssh-key: ${{ secrets.DEPLOY_KEY_AGIM }}
          ssh-known-hosts: ${{ steps.github-host-keys.outputs.known_hosts }}
          persist-credentials: true

      - name: Checkout GONG target
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        uses: actions/checkout@v4
        with:
          repository: enxpower/pub
          path: targets/pub
          ssh-key: ${{ secrets.DEPLOY_KEY_GONG }}
          ssh-known-hosts: ${{ steps.github-host-keys.outputs.known_hosts }}
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Prepare isolated state transaction
        shell: bash
        run: |
          set -euo pipefail
          test -f "$PHASE2_STATE_PATH"
          mkdir -p "$(dirname "$PHASE2_PREVIOUS_STATE_PATH")"
          cp "$PHASE2_STATE_PATH" "$PHASE2_PREVIOUS_STATE_PATH"

      - name: Validate workflow safety
        shell: bash
        run: |
          set -euo pipefail
          operational_steps="$(awk '
            $0 == "      - name: Validate workflow safety" { skip=1 }
            $0 == "      - name: Create incremental lifecycle plan" { skip=0 }
            skip != 1 { print }
          ' .github/workflows/incremental-content-publish.yml)"
          blocked="$(printf '%s' "$operational_steps" | grep -E 'npm run assign-id|npm run ci:writeback|npm run writeback:routed|preview-publish|PUBLISHER_DEPLOY_TOKEN|PUBLISHER_STATE_TOKEN|Share Token.*generate|Share Token.*rotate|PATCH https://api.notion.com|POST https://api.notion.com' || true)"
          if [ -n "$blocked" ]; then
            echo "Incremental content publish workflow references a blocked mutation or legacy publishing path."
            exit 1
          fi

      - name: Create incremental lifecycle plan
        run: npm run plan:incremental

      - name: Detect PDF render work
        id: render-work
        shell: bash
        run: |
          set -euo pipefail
          count="$(jq '[.records[] | select(.action == "CREATE" or .action == "UPDATE" or .action == "MOVE")] | length' "$INCREMENTAL_PLAN_PATH")"
          echo "count=$count" >> "$GITHUB_OUTPUT"
          if [ "$count" -gt 0 ]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          else
            echo "required=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Typst for render work
        if: ${{ steps.render-work.outputs.required == 'true' }}
        uses: typst-community/setup-typst@v4

      - name: Install CJK and Latin fonts for render work
        if: ${{ steps.render-work.outputs.required == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -f

      - name: Dry-run incremental publish
        if: ${{ steps.execution.outputs.mode == 'dry-run' }}
        run: npm run publish:incremental:dry-run

      - name: Apply incremental output locally
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        env:
          INCREMENTAL_LIFECYCLE_WRITEBACK: "false"
        run: npm run publish:incremental

      - name: Detect ARCBOS Pages artifact work
        id: arcbos-artifact
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        shell: bash
        run: |
          set -euo pipefail
          required="$(jq -r '[.brandResults[] | select(.brand == "ARCBOS" and .deployed == true)] | length > 0' "$INCREMENTAL_APPLY_RESULT_PATH")"
          echo "required=$required" >> "$GITHUB_OUTPUT"

      - name: Prepare sanitized ARCBOS Pages artifact
        if: ${{ steps.arcbos-artifact.outputs.required == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          artifact_root="targets/arcbos-pages"
          test -d "$artifact_root"
          printf 'docs.arcbos.com\n' > "$artifact_root/CNAME"
          touch "$artifact_root/.nojekyll"
          find "$artifact_root" -type f \( \
            -name '*.typ' -o -name '.env' -o -name '.env.*' \
            -o -iname '*backup*' -o -iname '*audit* -o -iname '*diagnostic*' \
            -o -path '*/reports/*' -o -path '*/diagnostics/*' \
          \) -delete
          blocked_count="$(find "$artifact_root" -type f \( -name '*.typ' -o -name '.env' -o -name '.env.*' -o -path '*/reports/*' -o -path '*/diagnostics/*' \) | wc -l | tr -d ' ')"
          if [ "$blocked_count" != "0" ]; then
            echo "Blocked files remain in ARCBOS Pages artifact: $blocked_count"
            exit 1
          fi
          secret_match_count="$({ grep -RIE 'github_pat_|gh[pousr]_|ntn_|Bearer[[:space:]]+[A-Za-z0-9._-]{20,}' "$artifact_root" || true; } | wc -l | tr -d ' ')"
          if [ "$secret_match_count" != "0" ]; then
            echo "Credential-shaped content blocked from ARCBOS Pages artifact: $secret_match_count"
            exit 1
          fi

      - name: Configure GitHub Pages for ARCBOS
        if: ${{ steps.arcbos-artifact.outputs.required == 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload ARCBOS Pages artifact
        if: ${{ steps.arcbos-artifact.outputs.required == 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: targets/arcbos-pages

      - name: Deploy ARCBOS Pages artifact
        id: deploy-arcbos
        if: ${{ steps.arcbos-artifact.outputs.required == 'true' }}
        uses: actions/deploy-pages@v4

      - name: Validate target repository boundaries
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        shell: bash
        run: |
          set -euo pipefail
          validate_paths() {
            repo="$1"
            allowed="$2"
            changed="$({
              git -C "$repo" diff --name-only --diff-filter=ACDMRTUXB
              git -C "$repo" ls-files --others --exclude-standard
            } | sort -u)"
            if [ -z "$changed" ]; then
              return 0
            fi
            invalid="$(printf '%s\n' "$changed" | grep -Ev "$allowed" || true)"
            if [ -n "$invalid" ]; then
              echo "Blocked publisher changes outside the approved boundary in $repo:"
              printf '%s\n' "$invalid"
              exit 1
            fi
          }
          validate_paths targets/docs-energize-v2 '^(clients|internal|pdf|assets)/'
          validate_paths targets/agim-docs '^(clients|internal|pdf|assets)/'
          validate_paths targets/pub '^gong-docs/'

      - name: Commit target repositories
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/phase2-run
          : > dist/phase2-run/target-commits.txt
          if [ "${{ steps.arcbos-artifact.outputs.required }}" = "true" ]; then
            printf 'ARCBOS pages-artifact\n' >> dist/phase2-run/target-commits.txt
          else
            printf 'ARCBOS unchanged\n' >> dist/phase2-run/target-commits.txt
          fi
          for spec in \
            "ENERGIZE:targets/docs-energize-v2" \
            "AGIM:targets/agim-docs" \
            "GONG:targets/pub"; do
            brand="${spec%%:*}"
            repo="${spec#*:}"
            git -C "$repo" config user.name "github-actions[bot]"
            git -C "$repo" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            if git -C "$repo" status --short | grep -q .; then
              git -C "$repo" add -A
              git -C "$repo" commit -m "chore: publish incremental document updates"
              git -C "$repo" push
              printf '%s %s\n' "$brand" "$(git -C "$repo" rev-parse HEAD)" >> dist/phase2-run/target-commits.txt
            else
              printf '%s unchanged\n' "$brand" >> dist/phase2-run/target-commits.txt
            fi
          done

      - name: Verify live deployment transaction
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        run: npm run verify:incremental-deploy

      - name: Persist verified private state
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        working-directory: state
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add incremental-state.json
          if git diff --cached --quiet; then
            echo "No private state changes."
          else
            git commit -m "chore: commit verified incremental publisher state"
            git push
          fi

      - name: Write verified lifecycle results to Notion
        if: ${{ steps.execution.outputs.mode == 'apply' }}
        run: npm run writeback:incremental

      - name: Upload transaction diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: incremental-publish-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 3
          path: |
            dist/incremental-plan/**
            dist/incremental-apply/**
            dist/phase2-run/**

      - name: Publish run summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## Incremental Content Publish"
            echo ""
            echo "Mode: ${{ steps.execution.outputs.mode }}"
            echo "Render actions: ${{ steps.render-work.outputs.count || '0' }}"
            echo "ARCBOS Pages artifact: ${{ steps.arcbos-artifact.outputs.required || 'false' }}"
            if [ -f "$INCREMENTAL_APPLY_RESULT_PATH" ]; then
              echo ""
              echo '```json'
              jq '{mode, renderedDocumentCount, generatedPdfCount, deployedBrandCount, copiedFileCount, deletedFileCount, notionMutationCount, brandResults, recordResults}' "$INCREMENTAL_APPLY_RESULT_PATH"
              echo '```'
            fi
            if [ -f dist/phase2-run/target-commits.txt ]; then
              echo ""
              echo "Target commits:"
              sed 's/^/- /' dist/phase2-run/target-commits.txt
            fi
            if [ -f "$INCREMENTAL_WRITEBACK_RESULT_PATH" ]; then
              echo ""
              echo "Notion mutations: $(jq -r '.mutationCount' "$INCREMENTAL_WRITEBACK_RESULT_PATH")"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report owner-command result
        if: ${{ always() && github.event_name == 'issue_comment' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          report="$(mktemp)"
          {
            echo "### Incremental Content Publish"
            echo
            echo "- Run ID: \`$GITHUB_RUN_ID\`"
            echo "- Result: **$JOB_STATUS**"
            echo "- Run: https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Render actions detected: \`${{ steps.render-work.outputs.count || '0' }}\`"
            echo "- ARCBOS Pages artifact deployed: \`${{ steps.arcbos-artifact.outputs.required || 'false' }}\`"
            if [ -f "$INCREMENTAL_APPLY_RESULT_PATH" ]; then
              echo "- Lifecycle counts: \`$(jq -c '.recordResults | group_by(.action) | map({key: .[0].action, value: length}) | from_entries' "$INCREMENTAL_APPLY_RESULT_PATH")\`"
              echo "- Work: rendered=\`$(jq -r '.renderedDocumentCount' "$INCREMENTAL_APPLY_RESULT_PATH")\`, pdfs=\`$(jq -r '.generatedPdfCount' "$INCREMENTAL_APPLY_RESULT_PATH")\`, brands=\`$(jq -r '.deployedBrandCount' "$INCREMENTAL_APPLY_RESULT_PATH")\`, copied=\`$(jq -r '.copiedFileCount' "$INCREMENTAL_APPLY_RESULT_PATH")\`, deleted=\`$(jq -r '.deletedFileCount' "$INCREMENTAL_APPLY_RESULT_PATH")\`"
            fi
            if [ -f dist/phase2-run/target-commits.txt ]; then
              echo "- Target commits:"
              sed 's/^/  - /' dist/phase2-run/target-commits.txt
            fi
            if [ -f "$INCREMENTAL_VERIFICATION_RESULT_PATH" ]; then
              echo "- Live lifecycle records verified: \`$(jq -r '.verifiedRecordCount' "$INCREMENTAL_VERIFICATION_RESULT_PATH")\`"
            fi
            if [ -f "$INCREMENTAL_WRITEBACK_RESULT_PATH" ]; then
              echo "- Notion mutations: \`$(jq -r '.mutationCount' "$INCREMENTAL_WRITEBACK_RESULT_PATH")\`"
            fi
          } > "$report"
          gh issue comment "${{ github.event.issue.number }}" --repo "$GITHUB_REPOSITORY" --body-file "$report"
