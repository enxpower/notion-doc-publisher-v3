name: Apply One-Click Publish Hotfix

on:
  push:
    branches:
      - hotfix/one-click-production-publish

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: hotfix/one-click-production-publish
          fetch-depth: 0

      - name: Patch production workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          workflow_path = Path('.github/workflows/incremental-content-publish.yml')
          text = workflow_path.read_text()

          text, count = re.subn(
              r"on:\n  workflow_dispatch:\n    inputs:\n(?:.*\n)*?(?=  issue_comment:)",
              "on:\n  workflow_dispatch:\n",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not replace workflow_dispatch inputs block')

          replacement = '''      - name: Resolve execution mode
                id: execution
                shell: bash
                env:
                  COMMENT_BODY: ${{ github.event.comment.body }}
                run: |
                  set -euo pipefail
                  if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
                    if ! printf '%s' "$COMMENT_BODY" | grep -Eq '^/phase2-publish PHASE2-INCREMENTAL-PUBLISH [A-Za-z0-9._-]+ [A-Za-z0-9._-]+$'; then
                      echo "Issue command format is invalid."
                      exit 1
                    fi
                  elif [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] && [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
                    echo "Unsupported trigger: $GITHUB_EVENT_NAME"
                    exit 1
                  fi
                  echo "mode=apply" >> "$GITHUB_OUTPUT"

          '''
          text, count = re.subn(
              r"      - name: Resolve execution mode\n(?:.*\n)*?(?=      - name: Load verified GitHub SSH host keys)",
              replacement,
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not replace execution-mode step')

          workflow_path.write_text(text)

          cli_path = Path('src/cli/plan-incremental.ts')
          cli = cli_path.read_text()
          cli, count = re.subn(
              r'''  const eventName = process\.env\.GITHUB_EVENT_NAME \?\? "";\n  if \(eventName === "schedule" \|\| eventName === "issue_comment"\) \{\n    return true;\n  \}\n  if \(eventName !== "workflow_dispatch"\) \{\n    return false;\n  \}\n\n  const eventPath = process\.env\.GITHUB_EVENT_PATH;\n  if \(!eventPath\) \{\n    throw new UserFacingError\("GITHUB_EVENT_PATH is required to resolve a production workflow_dispatch mode\."\);\n  \}\n  const event = JSON\.parse\(await fs\.readFile\(eventPath, "utf8"\)\) as \{ inputs\?: \{ mode\?: unknown \} \};\n  return event\.inputs\?\.mode === "apply";''',
              '''  const eventName = process.env.GITHUB_EVENT_NAME ?? "";
          return eventName === "workflow_dispatch" || eventName === "schedule" || eventName === "issue_comment";''',
              cli,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not make workflow_dispatch an unconditional production apply')
          cli_path.write_text(cli)

          helper = Path('.github/workflows/_one-click-hotfix.yml')
          helper.unlink()
          PY

      - name: Commit patched files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: make manual production publish one click"
          git push origin HEAD:hotfix/one-click-production-publish
