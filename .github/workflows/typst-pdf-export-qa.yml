name: Typst PDF Export QA

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to check out
        required: true
        default: spike/typst-pdf-publisher
      doc_id:
        description: DOC_ID to render (e.g. ARCBOS-AGR-2606-0008)
        required: true
        default: ARCBOS-AGR-2606-0008

permissions:
  contents: read

jobs:
  typst-pdf-qa:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # NOTION_TOKEN is intentionally scoped only to the "Generate Typst source
      # and PDF" step below (Phase 3 Prompt 5 hardening).
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Typst
        uses: typst-community/setup-typst@48aeee7543d37f01afd1ffb27307dc277387ba13 # v4.3.1

      - name: Install fonts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -fv

      - name: TypeScript check
        run: npm run check

      - name: Tests
        run: npm test

      - name: Security lint
        run: npm run lint:security

      - name: Generate Typst source and PDF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: npm run pdf:typst -- ${{ github.event.inputs.doc_id }}

      - name: Upload Typst source
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typst-source
          path: prototype/output/*.typ
          if-no-files-found: warn
          retention-days: 14

      - name: Upload PDF
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typst-pdf
          path: prototype/output/*.pdf
          if-no-files-found: warn
          retention-days: 14

      - name: Upload all prototype output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: typst-output-all
          path: prototype/output/**
          if-no-files-found: warn
          retention-days: 14
