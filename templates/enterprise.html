<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} - {{docId}}</title>
    <link rel="stylesheet" href="{{screenCss}}">
    <link rel="stylesheet" href="{{printCss}}" media="print">
  </head>
  <body>
    <main class="document">
      <header class="document-masthead">
        <div class="masthead-row">
          <div class="masthead-brand">{{brand}}</div>
          {{sloganBlock}}
        </div>
      </header>
      <section class="document-title-block">
        <p class="document-id">{{docId}}</p>
        <p class="document-kicker">{{documentType}}</p>
        <h1>{{title}}</h1>
      </section>
      <section class="document-summary" aria-label="Document metadata">
        <dl class="document-meta">
          <div><dt>Version</dt><dd>{{version}}</dd></div>
          <div><dt>Client</dt><dd>{{client}}</dd></div>
          <div><dt>Project</dt><dd>{{project}}</dd></div>
          <div><dt>Type</dt><dd>{{documentType}}</dd></div>
          <div><dt>Status</dt><dd>{{status}}</dd></div>
          <div><dt>Visibility</dt><dd>{{visibility}}</dd></div>
        </dl>
      </section>
      <div class="document-actions no-print">
        <button type="button" class="action-print" onclick="window.print()">Print / Save as PDF</button>
      </div>
      <section class="document-content">
        {{body}}
      </section>
      <footer class="document-footer">
        <span class="footer-brand">{{brand}}</span>
        <span class="footer-ref">{{docId}} &middot; Version {{version}}</span>
      </footer>
    </main>
  </body>
</html>
