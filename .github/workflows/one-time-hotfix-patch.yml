name: One-time Hotfix Patch

on:
  push:
    branches:
      - hotfix/phase2-arcbos-artifact-apply
    paths:
      - .github/workflows/one-time-hotfix-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch publish workflow assertions only
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- src/tests/incremental.test.ts
          python - <<'PY'
          from pathlib import Path
          p = Path('src/tests/incremental.test.ts')
          s = p.read_text()
          marker = 'test("incremental content publish workflow is manual, guarded, and route-bounded"'
          head, tail = s.split(marker, 1)
          tail = tail.replace('assert.ok(!operationalWorkflow.includes("actions/deploy-pages"));', 'assert.ok(operationalWorkflow.includes("actions/deploy-pages"));', 1)
          tail = tail.replace('assert.ok(!operationalWorkflow.includes("actions/upload-pages-artifact"));', 'assert.ok(operationalWorkflow.includes("actions/upload-pages-artifact"));', 1)
          p.write_text(head + marker + tail)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tests/incremental.test.ts
          git commit -m "test: allow guarded Pages deployment in publish workflow"
          git push
