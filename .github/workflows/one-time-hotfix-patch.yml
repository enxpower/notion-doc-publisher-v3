name: One-time Hotfix Patch

on:
  push:
    branches:
      - hotfix/phase2-arcbos-artifact-apply
    paths:
      - .github/workflows/one-time-hotfix-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore and patch regression files
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git checkout origin/main -- src/tests/routed-readonly.test.ts
          sed -i 's/energizeos-share-preview\.png/energizeos-favicon.svg/' src/tests/routed-readonly.test.ts
          sed -i 's#"clients", "arcbosclient01"#"docs", "ARCBOS-SPEC-2606-0001"#' src/tests/incremental-apply.test.ts
          sed -i 's/assert\.ok(!operationalWorkflow\.includes("actions\/deploy-pages"));/assert.ok(operationalWorkflow.includes("actions\/deploy-pages"));/' src/tests/incremental.test.ts
          sed -i 's/assert\.ok(!operationalWorkflow\.includes("actions\/upload-pages-artifact"));/assert.ok(operationalWorkflow.includes("actions\/upload-pages-artifact"));/' src/tests/incremental.test.ts
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tests/routed-readonly.test.ts src/tests/incremental-apply.test.ts src/tests/incremental.test.ts
          git commit -m "test: align Phase 2 artifact and favicon expectations"
          git push
