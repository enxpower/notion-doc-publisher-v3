name: Run Production Once

on:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch sole production publisher
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run incremental-content-publish.yml --ref main
