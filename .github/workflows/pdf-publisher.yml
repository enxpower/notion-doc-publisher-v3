name: PDF Publisher 2.0

# Manual only — no schedule, no push trigger, no automatic Notion writeback by default.
on:
  workflow_dispatch:
    inputs:
      doc_id:
        description: "DOC_ID to export (e.g. ARCBOS-AGR-2606-0008) or ALL"
        required: true
        default: ARCBOS-AGR-2606-0008
        type: string
      branch:
        description: "Branch to check out"
        required: false
        default: main
        type: string
      writeback:
        description: "Write PDF status back to Notion (true = live, false = dry-run)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  pdf-publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}
      PDF_WRITEBACK: ${{ inputs.writeback }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install CJK and Latin fonts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -fv

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Lint security
        run: npm run lint:security

      - name: Run PDF queue
        env:
          PDF_DOC_ID: ${{ inputs.doc_id }}
        run: npm run pdf:queue -- "$PDF_DOC_ID"

      - name: Upload PDF artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdf-${{ inputs.doc_id }}-${{ github.run_id }}
          path: pdf-output/
          if-no-files-found: warn
          retention-days: 30
