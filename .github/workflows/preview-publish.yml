name: Preview Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/preview-publish.yml"
      - "src/**"
      - "styles/**"
      - "templates/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  preview-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ vars.PREVIEW_BASE_URL }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Required secret:
      # - NOTION_TOKEN
      # Required variables or secrets:
      # - NOTION_DATABASE_ID
      # - ALLOWED_VISIBILITY
      # - PUBLISHABLE_STATUSES
      # - BRAND_TOKENS_JSON
      # - DOCUMENT_TYPE_TOKENS_JSON
      # - PREVIEW_DEPLOY_ENABLED
      # - PREVIEW_BASE_URL
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}
      PREVIEW_DEPLOY_ENABLED: ${{ vars.PREVIEW_DEPLOY_ENABLED || secrets.PREVIEW_DEPLOY_ENABLED }}
      PREVIEW_BASE_URL: ${{ vars.PREVIEW_BASE_URL || secrets.PREVIEW_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Safety guard
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY##*/}"
          case "$repo_name" in
            docs-arcbos-v2|docs-energize-v2|notion-publisher-v2)
              echo "Preview deployment is forbidden from repository: $repo_name"
              exit 1
              ;;
          esac

      - name: Resolve deployment settings
        id: preview
        shell: bash
        run: |
          set -euo pipefail

          enabled="$(printf '%s' "${PREVIEW_DEPLOY_ENABLED:-}" | tr '[:upper:]' '[:lower:]' | xargs)"
          base_url="$(printf '%s' "${PREVIEW_BASE_URL:-}" | xargs)"

          if [ "$enabled" = "true" ]; then
            if [ -z "$base_url" ]; then
              echo "PREVIEW_BASE_URL is required when PREVIEW_DEPLOY_ENABLED=true."
              exit 1
            fi
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Preview deployment enabled."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Preview deployment disabled."
          fi

          echo "base_url=$base_url" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Assign missing DOC_IDs
        run: npm run assign-id

      - name: Build static preview
        id: build
        continue-on-error: true
        run: npm run build

      - name: Configure GitHub Pages
        if: steps.preview.outputs.enabled == 'true' && steps.build.outcome == 'success'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: steps.preview.outputs.enabled == 'true' && steps.build.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy preview to GitHub Pages
        id: deploy
        continue-on-error: true
        if: steps.preview.outputs.enabled == 'true' && steps.build.outcome == 'success'
        uses: actions/deploy-pages@v4

      - name: Preview deployment skipped
        if: steps.preview.outputs.enabled != 'true' && steps.build.outcome == 'success'
        run: echo "PREVIEW_DEPLOY_ENABLED is not true. Built dist/ but skipped preview deployment."

      - name: Write results back to Notion
        if: always() && steps.build.outcome != 'skipped'
        env:
          BUILD_RESULT: ${{ steps.build.outcome }}
          DEPLOY_RESULT: ${{ steps.deploy.outcome }}
        run: npm run ci:writeback

      - name: Fail workflow when build or deploy failed
        if: steps.build.outcome != 'success' || (steps.preview.outputs.enabled == 'true' && steps.deploy.outcome != 'success')
        run: |
          echo "Preview publish failed during build or preview deployment. Notion write-back has been attempted."
          exit 1
