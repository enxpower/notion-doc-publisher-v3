name: ARCBOS Pages Clean Deploy

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  # Phase 3 Prompt 7: shares the production publisher's concurrency group so
  # GitHub Actions serializes manual disaster-recovery Pages deployment
  # against the automatic production publisher — the two can never run their
  # jobs concurrently and race for the same ARCBOS Pages deployment target.
  group: incremental-content-publish
  cancel-in-progress: false

jobs:
  clean-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://docs.arcbos.com

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Validate workflow safety
        run: node scripts/clean-arcbos-pages-artifact.mjs validate-workflow

      - name: Verify active artifact identity
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/clean-arcbos-pages-artifact.mjs verify-source

      - name: Download active Pages artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          repository: enxpower/notion-doc-publisher-v3
          run-id: 29678904856
          artifact-ids: 8439893179
          github-token: ${{ github.token }}
          path: _active-pages-artifact
          merge-multiple: true

      - name: Build clean ARCBOS artifact
        run: node scripts/clean-arcbos-pages-artifact.mjs clean _active-pages-artifact _clean-pages-artifact

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Create clean Pages archive
        run: tar --dereference --hard-dereference --directory _clean-pages-artifact -cf "$RUNNER_TEMP/artifact.tar" --exclude=.git --exclude=.github .

      - name: Upload clean Pages artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy clean Pages artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
