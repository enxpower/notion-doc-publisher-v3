name: One-time Hotfix Patch

on:
  push:
    branches:
      - hotfix/phase2-arcbos-artifact-apply
    paths:
      - .github/workflows/one-time-hotfix-patch.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix ARCBOS artifact sanitation patterns
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('.github/workflows/incremental-content-publish.yml')
          s = p.read_text()
          old = "-o -iname '*backup*' -o -iname '*audit* -o -iname '*diagnostic*'"
          new = "-o -iname '*backup*' -o -iname '*audit*' -o -iname '*diagnostic*'"
          if old not in s:
              raise SystemExit('expected malformed sanitation pattern not found')
          p.write_text(s.replace(old, new, 1))
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/incremental-content-publish.yml
          git commit -m "fix: correct ARCBOS artifact sanitation patterns"
          git push
