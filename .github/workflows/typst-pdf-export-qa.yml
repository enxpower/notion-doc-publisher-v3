name: Typst PDF Export QA

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to check out
        required: true
        default: spike/typst-pdf-publisher
      doc_id:
        description: DOC_ID to render (e.g. ARCBOS-AGR-2606-0008)
        required: true
        default: ARCBOS-AGR-2606-0008

permissions:
  contents: read

jobs:
  typst-pdf-qa:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install fonts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -fv

      - name: TypeScript check
        run: npm run check

      - name: Tests
        run: npm test

      - name: Security lint
        run: npm run lint:security

      - name: Generate Typst source and PDF
        run: npm run pdf:typst -- ${{ github.event.inputs.doc_id }}

      - name: Upload Typst source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typst-source
          path: dist/typst/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload PDF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typst-pdf
          path: dist/pdf/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typst-reports
          path: dist/reports/
          if-no-files-found: ignore
          retention-days: 14
