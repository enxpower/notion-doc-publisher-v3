name: PDF Export (Sidecar)

# Manual only — no schedule, no push trigger, no deploy, no Notion writeback.
on:
  workflow_dispatch:
    inputs:
      doc_id:
        description: "DOC_ID to export (e.g. ARCBOS-AGR-2606-0008)"
        required: true
        default: ARCBOS-AGR-2606-0008
        type: string
      branch:
        description: "Branch to check out"
        required: false
        default: feature/sidecar-typst-pdf-export
        type: string

permissions:
  contents: read

jobs:
  export-pdf:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # NOTION_TOKEN is intentionally scoped only to the "Export PDF" step below
      # (Phase 3 Prompt 5 hardening) — checkout, npm ci, Typst/font install, and
      # artifact upload never receive it, narrowing exposure if the dispatcher-
      # supplied branch's dependency lifecycle scripts were ever compromised.
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Typst
        uses: typst-community/setup-typst@48aeee7543d37f01afd1ffb27307dc277387ba13 # v4.3.1

      - name: Install CJK and Latin fonts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -fv

      - name: Export PDF
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: npm run pdf:export -- ${{ inputs.doc_id }}

      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pdf-${{ inputs.doc_id }}
          path: pdf-output/
          if-no-files-found: warn
          retention-days: 30
