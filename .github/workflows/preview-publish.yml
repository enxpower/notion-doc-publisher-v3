name: Preview Publish

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  preview-publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Required secret:
      # - NOTION_TOKEN
      # Required variables or secrets:
      # - NOTION_DATABASE_ID
      # - ALLOWED_VISIBILITY
      # - PUBLISHABLE_STATUSES
      # - BRAND_TOKENS_JSON
      # - DOCUMENT_TYPE_TOKENS_JSON
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}
      # Preview Publish is a manual QA workflow only. It must never deploy to
      # GitHub Pages or claim a production publish in Notion: Incremental
      # Content Publish (.github/workflows/incremental-content-publish.yml)
      # is the sole owner of the production ARCBOS Pages artifact and of
      # production PUBLISHED_URL / BUILD_STATUS writeback. This is hardcoded
      # rather than sourced from a repository variable so it cannot drift
      # from an operator forgetting to leave a toggle off.
      PREVIEW_DEPLOY_ENABLED: "false"
      ALLOWED_BRANDS: ${{ vars.ALLOWED_BRANDS || secrets.ALLOWED_BRANDS || 'ARCBOS' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Safety guard
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY##*/}"
          case "$repo_name" in
            docs-arcbos-v2|docs-energize-v2|notion-publisher-v2)
              echo "Preview deployment is forbidden from repository: $repo_name"
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install CJK and Latin fonts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -fv

      - name: Regression tests (no Notion access)
        run: npm test

      - name: Assign missing DOC_IDs
        # Transient Notion API failures (e.g. 504) are downgraded to warnings
        # inside the script and exit 0.  continue-on-error is a final safety
        # net in case an unexpected code path still exits non-zero, ensuring
        # the publish pipeline is never blocked by a DOC_ID assignment issue.
        continue-on-error: true
        run: npm run assign-id

      - name: Build static preview
        id: build
        continue-on-error: true
        run: npm run build

      - name: Generate site PDFs
        id: pdf-site
        if: steps.build.outcome == 'success'
        continue-on-error: ${{ vars.PDF_REQUIRED != 'true' }}
        env:
          PDF_REQUIRED: ${{ vars.PDF_REQUIRED || 'false' }}
        run: npm run pdf:site

      - name: Preview deployment disabled
        if: steps.build.outcome == 'success'
        run: echo "Preview Publish is a manual QA workflow and never deploys to GitHub Pages. Built dist/ only."

      - name: Write results back to Notion
        if: always() && steps.build.outcome != 'skipped'
        env:
          BUILD_RESULT: ${{ steps.build.outcome }}
        run: npm run ci:writeback

      - name: Fail workflow when build failed
        if: steps.build.outcome != 'success'
        run: |
          echo "Preview publish failed during build. Notion write-back has been attempted."
          exit 1
