name: Incremental Content Plan

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: incremental-content-plan
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || 'Public' }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || 'Final' }}
      BRAND_TOKENS_JSON: '{"ARCBOS":"ARCBOS","ENERGIZE":"ENERGIZE","AGIM":"AGIM","GONG":"GONG"}'
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate workflow safety
        shell: bash
        run: |
          set -euo pipefail
          operational_steps="$(awk '
            /name: Validate workflow safety/ { skip=1 }
            /name: Plan lifecycle actions/ { skip=0 }
            skip != 1 { print }
          ' .github/workflows/incremental-content-plan.yml)"
          blocked="$(printf '%s' "$operational_steps" | grep -E 'npm run assign-id|npm run ci:writeback|npm run writeback:routed|actions/deploy-pages|actions/upload-pages-artifact|gh workflow run|PATCH https://api.notion.com|POST https://api.notion.com' || true)"
          if [ -n "$blocked" ]; then
            echo "Incremental content plan workflow references mutation or deployment-capable commands."
            exit 1
          fi

      - name: Plan lifecycle actions
        run: npm run plan:incremental
