name: Apply One-Click Publish Hotfix

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  patch:
    if: >-
      github.event.issue.number == 44 &&
      github.actor == 'enxpower' &&
      github.event.comment.body == '/apply-one-click-publish-hotfix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch production workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          workflow_path = Path('.github/workflows/incremental-content-publish.yml')
          text = workflow_path.read_text()

          text, count = re.subn(
              r"on:\n  workflow_dispatch:\n    inputs:\n(?:.*\n)*?(?=  issue_comment:)",
              "on:\n  workflow_dispatch:\n",
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not replace workflow_dispatch inputs block')

          replacement = '''      - name: Resolve execution mode
                id: execution
                shell: bash
                env:
                  COMMENT_BODY: ${{ github.event.comment.body }}
                run: |
                  set -euo pipefail
                  if [ "$GITHUB_EVENT_NAME" = "issue_comment" ]; then
                    if ! printf '%s' "$COMMENT_BODY" | grep -Eq '^/phase2-publish PHASE2-INCREMENTAL-PUBLISH [A-Za-z0-9._-]+ [A-Za-z0-9._-]+$'; then
                      echo "Issue command format is invalid."
                      exit 1
                    fi
                  elif [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] && [ "$GITHUB_EVENT_NAME" != "schedule" ]; then
                    echo "Unsupported trigger: $GITHUB_EVENT_NAME"
                    exit 1
                  fi
                  echo "mode=apply" >> "$GITHUB_OUTPUT"

          '''
          text, count = re.subn(
              r"      - name: Resolve execution mode\n(?:.*\n)*?(?=      - name: Load verified GitHub SSH host keys)",
              replacement,
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit('Could not replace execution-mode step')
          workflow_path.write_text(text)

          cli_path = Path('src/cli/plan-incremental.ts')
          cli = cli_path.read_text()
          old = '''  const eventName = process.env.GITHUB_EVENT_NAME ?? "";
            if (eventName === "schedule" || eventName === "issue_comment") {
              return true;
            }
            if (eventName !== "workflow_dispatch") {
              return false;
            }

            const eventPath = process.env.GITHUB_EVENT_PATH;
            if (!eventPath) {
              throw new UserFacingError("GITHUB_EVENT_PATH is required to resolve a production workflow_dispatch mode.");
            }
            const event = JSON.parse(await fs.readFile(eventPath, "utf8")) as { inputs?: { mode?: unknown } };
            return event.inputs?.mode === "apply";'''
          if old not in cli:
              old = old.replace('            ', '')
          new = '''  const eventName = process.env.GITHUB_EVENT_NAME ?? "";
            return eventName === "workflow_dispatch" || eventName === "schedule" || eventName === "issue_comment";'''.replace('            ', '')
          if old not in cli:
              raise SystemExit('Could not make workflow_dispatch an unconditional production apply')
          cli_path.write_text(cli.replace(old, new, 1))

          Path('.github/workflows/_one-click-hotfix.yml').unlink()
          PY

      - name: Commit patched files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: make manual production publish one click"
          git push origin HEAD:main
