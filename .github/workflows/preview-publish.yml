name: Preview Publish

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: preview-publish
  cancel-in-progress: false

jobs:
  preview-publish:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_DATABASE_ID: ${{ vars.NOTION_DATABASE_ID || secrets.NOTION_DATABASE_ID }}
      ALLOWED_VISIBILITY: ${{ vars.ALLOWED_VISIBILITY || secrets.ALLOWED_VISIBILITY }}
      PUBLISHABLE_STATUSES: ${{ vars.PUBLISHABLE_STATUSES || secrets.PUBLISHABLE_STATUSES }}
      BRAND_TOKENS_JSON: ${{ vars.BRAND_TOKENS_JSON || secrets.BRAND_TOKENS_JSON }}
      DOCUMENT_TYPE_TOKENS_JSON: ${{ vars.DOCUMENT_TYPE_TOKENS_JSON || secrets.DOCUMENT_TYPE_TOKENS_JSON }}
      # Preview Publish is manual QA only. It must never deploy, initialize
      # identities, or write production lifecycle fields back to Notion.
      PREVIEW_DEPLOY_ENABLED: "false"
      ALLOWED_BRANDS: ${{ vars.ALLOWED_BRANDS || secrets.ALLOWED_BRANDS || 'ARCBOS' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Safety guard
        shell: bash
        run: |
          set -euo pipefail
          repo_name="${GITHUB_REPOSITORY##*/}"
          case "$repo_name" in
            docs-arcbos-v2|docs-energize-v2|notion-publisher-v2)
              echo "Preview execution is forbidden from repository: $repo_name"
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Typst
        uses: typst-community/setup-typst@v4

      - name: Install CJK and Latin fonts
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-cjk fonts-noto-cjk-extra fonts-liberation
          sudo fc-cache -fv

      - name: Regression tests (no Notion writes)
        run: npm test

      - name: Build static preview in read-only mode
        id: build
        continue-on-error: true
        run: npm run build:readonly-validation

      - name: Generate site PDFs
        id: pdf-site
        if: steps.build.outcome == 'success'
        continue-on-error: ${{ vars.PDF_REQUIRED != 'true' }}
        env:
          PDF_REQUIRED: ${{ vars.PDF_REQUIRED || 'false' }}
        run: npm run pdf:site

      - name: Confirm preview isolation
        if: steps.build.outcome == 'success'
        run: echo "Preview completed locally in dist/. No deployment, DOC_ID assignment, Share Token mutation, or Notion writeback was performed."

      # Historical compatibility marker for tests and archaeology only:
      # run: npm run ci:writeback

      - name: Fail workflow when build failed
        if: steps.build.outcome != 'success'
        run: |
          echo "Preview build failed. Production sites and Notion lifecycle fields were not modified."
          exit 1
